name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction || true

      - name: Build plugin zip
        run: |
          SLUG=aggregate-it
          mkdir -p build/$SLUG
          rsync -a --exclude-from=.distignore ./ build/$SLUG/ 2>/dev/null || \
            rsync -a \
              --exclude '.git' --exclude '.github' --exclude 'build' \
              --exclude 'tests' --exclude 'node_modules' --exclude 'bin' \
              --exclude 'docs' --exclude '*.md' --exclude 'phpunit.xml.dist' \
              ./ build/$SLUG/
          cd build && zip -r ../$SLUG.zip $SLUG

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: aggregate-it.zip
